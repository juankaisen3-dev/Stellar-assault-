// ═══════════════════════════════════════════════════
//  THREE.JS — WARP STARFIELD
// ═══════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('bg');
  const rdr=new THREE.WebGLRenderer({canvas:cv,antialias:false});
  rdr.setPixelRatio(Math.min(devicePixelRatio,2));
  rdr.setSize(innerWidth,innerHeight);
  const sc=new THREE.Scene(); sc.background=new THREE.Color(0x00000a);
  const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);
  cam.position.z=4;
  const N=3500, p=new Float32Array(N*3), c=new Float32Array(N*3), sz=new Float32Array(N);
  for(let i=0;i<N;i++){
    p[i*3]=(Math.random()-.5)*300; p[i*3+1]=(Math.random()-.5)*300; p[i*3+2]=(Math.random()-.5)*200;
    const b=Math.random()>.75;
    c[i*3]=b?.35:(.6+Math.random()*.4); c[i*3+1]=b?.55:(.6+Math.random()*.4); c[i*3+2]=b?(.8+Math.random()*.2):(.6+Math.random()*.4);
    sz[i]=Math.random()*1.8+.3;
  }
  const sg=new THREE.BufferGeometry();
  sg.setAttribute('position',new THREE.BufferAttribute(p,3));
  sg.setAttribute('color',new THREE.BufferAttribute(c,3));
  const sm=new THREE.PointsMaterial({size:.4,vertexColors:true,transparent:true,opacity:.9});
  const stars=new THREE.Points(sg,sm); sc.add(stars);
  function loop(){requestAnimationFrame(loop);
    const pa=sg.attributes.position.array;
    for(let i=0;i<N;i++){pa[i*3+2]+=sz[i]*.09;if(pa[i*3+2]>100)pa[i*3+2]=-100;}
    sg.attributes.position.needsUpdate=true; stars.rotation.z=Math.sin(Date.now()*.0003)*.015;
    rdr.render(sc,cam);
  } loop();
  window.addEventListener('resize',()=>{rdr.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();});
})();

// ═══════════════════════════════════════════════════
//  MENU SCENE
// ═══════════════════════════════════════════════════
class MenuScene extends Phaser.Scene{
  constructor(){super('Menu')}
  create(){
    const {width:W,height:H}=this.scale, cx=W/2;
    this.add.text(cx,H*.10,'STELLAR',{fontFamily:'Orbitron',fontSize:Math.floor(W*.12)+'px',fill:'#00ffcc',stroke:'#004433',strokeThickness:5}).setOrigin(.5);
    this.add.text(cx,H*.22,'ASSAULT',{fontFamily:'Orbitron',fontSize:Math.floor(W*.12)+'px',fill:'#ff3300',stroke:'#550000',strokeThickness:5}).setOrigin(.5);
    this.add.text(cx,H*.33,'— 20 NIVEAUX · 6 BOSS —',{fontFamily:'Orbitron',fontSize:Math.floor(W*.033)+'px',fill:'#444466'}).setOrigin(.5);
    const hs=localStorage.getItem('sa_hs')||0;
    this.add.text(cx,H*.40,`MEILLEUR SCORE : ${hs}`,{fontFamily:'Orbitron',fontSize:Math.floor(W*.036)+'px',fill:'#ffaa00'}).setOrigin(.5);
    const ml=parseInt(localStorage.getItem('sa_ml')||1);
    if(ml>1) this.add.text(cx,H*.47,`NIVEAU MAX ATTEINT : ${ml}/20`,{fontFamily:'Orbitron',fontSize:Math.floor(W*.03)+'px',fill:'#aaaacc'}).setOrigin(.5);
    // Controls
    const cs=[['WASD / ⬆⬇⬅➡','Déplacer'],['ESPACE','Tirer (maintenir)'],['B','Bombe'],['P / ÉCHAP','Pause']];
    cs.forEach(([k,v],i)=>{
      const y=H*.55+i*H*.055;
      this.add.text(cx-8,y,k,{fontFamily:'Orbitron',fontSize:Math.floor(W*.028)+'px',fill:'#00ffcc',align:'right'}).setOrigin(1,.5);
      this.add.text(cx+8,y,v,{fontFamily:'Orbitron',fontSize:Math.floor(W*.028)+'px',fill:'#999bbb'}).setOrigin(0,.5);
    });
    const btn=this.add.text(cx,H*.84,'[ JOUER ]',{fontFamily:'Orbitron',fontSize:Math.floor(W*.075)+'px',fill:'#00ff88',stroke:'#004422',strokeThickness:3}).setOrigin(.5).setInteractive({useHandCursor:true});
    this.tweens.add({targets:btn,scaleX:1.06,scaleY:1.06,duration:700,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    btn.on('pointerdown',()=>this.scene.start('Game',{startLevel:1}));
    if(ml>1){
      const cBtn=this.add.text(cx,H*.93,`[ CONTINUER NIVEAU ${ml} ]`,{fontFamily:'Orbitron',fontSize:Math.floor(W*.033)+'px',fill:'#aaaaff',stroke:'#222244',strokeThickness:2}).setOrigin(.5).setInteractive({useHandCursor:true});
      cBtn.on('pointerdown',()=>this.scene.start('Game',{startLevel:ml}));
      cBtn.on('pointerover',()=>cBtn.setFill('#ffffff'));
      cBtn.on('pointerout',()=>cBtn.setFill('#aaaaff'));
    }
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Game',{startLevel:1}));
    const ship=this.add.image(cx,H*.49,'player').setAlpha(.12).setScale(2.4);
    this.tweens.add({targets:ship,y:H*.49-14,duration:1900,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
  }
}

// ═══════════════════════════════════════════════════
//  GAME SCENE — MOTEUR PRINCIPAL (CORRIGÉ)
// ═══════════════════════════════════════════════════
class GameScene extends Phaser.Scene{
  constructor(){super('Game')}

  init(d){
    this.startLvl=(d&&d.startLevel)||1;
    this.lvlIdx=this.startLvl-1;
    this.score=0; this.lives=3; this.dead=false; this.paused=false;
    this.phase='IDLE';
    this.waveIdx=0; this.combo=1; this.comboT=null;
    this.pSpeed=310; this.fireRate=230; this.lastShot=0;
    this.triShot=false; this.rapidFire=false; this.shielded=false; this.bombCnt=1;
    this.invincible=false; this.shootHeld=false; this.isTouching=false;
    this.touchX=null; this.touchY=null;
    this.boss=null; this.bossFireEvts=[];
    this.bossPhase=1;
    // Nettoyage des timers powerups
    this._powerupTimers = [];
  }

  create(){
    const {width:W,height:H}=this.scale; this.W=W; this.H=H;

    // Groups
    this.pBullets=this.physics.add.group();
    this.eBullets=this.physics.add.group();
    this.enemies=this.physics.add.group();
    this.bossGrp=this.physics.add.group();
    this.pups=this.physics.add.group();

    // Scrolling starfield (canvas)
    this.starsGfx=this.add.graphics().setDepth(0);
    this.stars=Array.from({length:65},()=>({
      x:Phaser.Math.Between(0,W), y:Phaser.Math.Between(0,H),
      s:Phaser.Math.FloatBetween(.8,3.5), a:Phaser.Math.FloatBetween(.2,.65),
      c:Math.random()>.8?0x8899ff:0xffffff
    }));

    // Player
    this.player=this.physics.add.image(W/2,H-90,'player').setDepth(10).setCollideWorldBounds(true);
    this.shieldImg=this.add.image(0,0,'shield_fx').setDepth(11).setAlpha(0);

    // Input
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys('W,S,A,D');
    this.spaceKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.bKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.B);
    this.pKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.P);
    this.escKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this.input.on('pointerdown',p=>{this.isTouching=true;this.touchX=p.x;this.touchY=p.y;this.shootHeld=true;});
    this.input.on('pointermove',p=>{if(this.isTouching){this.touchX=p.x;this.touchY=p.y;}});
    this.input.on('pointerup',()=>{this.isTouching=false;this.shootHeld=false;});

    // Overlaps
    this.physics.add.overlap(this.pBullets,this.enemies,this.onBltEnemy,null,this);
    this.physics.add.overlap(this.pBullets,this.bossGrp,this.onBltBoss,null,this);
    this.physics.add.overlap(this.eBullets,this.player,this.onEBltPlayer,null,this);
    this.physics.add.overlap(this.enemies,this.player,this.onEnemyPlayer,null,this);
    this.physics.add.overlap(this.bossGrp,this.player,this.onBossPlayer,null,this);
    this.physics.add.overlap(this.pups,this.player,this.onPickup,null,this);

    // Enemy auto-shoot timer
    this.eshootEvt=this.time.addEvent({delay:1600,callback:this.enemyShoot,callbackScope:this,loop:true});

    // UI
    this.buildUI();

    // Start
    this.time.delayedCall(300,()=>this.startLevel());
  }

  // ── UI ──
  buildUI(){
    const {W,H}=this; const fs=Math.floor(W*.042); const sm=Math.floor(W*.03);
    this.txtScore=this.add.text(10,10,'SCORE : 0',{fontFamily:'Orbitron',fontSize:fs+'px',fill:'#00ffcc'}).setDepth(20);
    this.txtCombo=this.add.text(10,12+fs,'',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#ffaa00'}).setDepth(20);
    this.txtLevel=this.add.text(W/2,10,'',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#ffcc44'}).setOrigin(.5,0).setDepth(20);
    this.txtLvNum=this.add.text(W/2,12+sm,'',{fontFamily:'Orbitron',fontSize:Math.floor(W*.025)+'px',fill:'#555577'}).setOrigin(.5,0).setDepth(20);
    this.txtLives=this.add.text(W-10,10,'❤️❤️❤️',{fontFamily:'monospace',fontSize:fs+'px'}).setOrigin(1,0).setDepth(20);
    this.txtBomb=this.add.text(W-10,12+fs,'💣×1',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#ff6644'}).setOrigin(1,0).setDepth(20);
    this.txtPups=this.add.text(10,H-28,'',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#ffffff'}).setDepth(20);
    // Boss bar
    const bw=W*.72;
    this.bBarBg=this.add.rectangle(W/2,H-26,bw,14,0x330000).setDepth(20).setVisible(false);
    this.bBar=this.add.rectangle(W/2-bw/2,H-26,bw,14,0xff2200).setOrigin(0,.5).setDepth(21).setVisible(false);
    this.bBarLbl=this.add.text(W/2,H-46,'',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#ff4444'}).setOrigin(.5).setDepth(21).setVisible(false);
    this.bBarPct=this.add.text(W/2,H-26,'',{fontFamily:'Orbitron',fontSize:Math.floor(W*.024)+'px',fill:'#ffcccc'}).setOrigin(.5).setDepth(22).setVisible(false);
    // Pause overlay
    this.pBg=this.add.rectangle(W/2,H/2,W,H,0x000000,.8).setDepth(50).setVisible(false);
    this.pTx=this.add.text(W/2,H/2,'⏸ PAUSE',{fontFamily:'Orbitron',fontSize:Math.floor(W*.09)+'px',fill:'#ffffff'}).setOrigin(.5).setDepth(51).setVisible(false);
    this.pSub=this.add.text(W/2,H*.58,'P ou ÉCHAP pour continuer',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#777799'}).setOrigin(.5).setDepth(51).setVisible(false);
  }

  // ── LEVEL SYSTEM ──
  startLevel(){
    if(this.dead) return;
    this.waveIdx=0; this.phase='ENEMIES';
    const lvl=LEVELS[this.lvlIdx];
    this.txtLevel.setText(`NIVEAU ${lvl.id}/20`);
    this.txtLvNum.setText(`${lvl.sector} — ${lvl.name}`);
    this.announce(`NIVEAU ${lvl.id}\n${lvl.name}`,lvl.id===20?'#ff00cc':'#ffffff',900);
    this.time.delayedCall(1300,()=>this.spawnWave());
  }

  spawnWave(){
    if(this.dead||this.phase!=='ENEMIES') return;
    const lvl=LEVELS[this.lvlIdx];
    if(this.waveIdx>=lvl.waves.length){this.bossComing(); return;}
    const wv=lvl.waves[this.waveIdx];
    const {W}=this; const sx=W/(wv.c+1);
    const spd=72+(this.lvlIdx*13);

    if(this.waveIdx>0) this.announce(`VAGUE ${this.waveIdx+1}/${lvl.waves.length}!`,'#ffaa00',500);

    for(let r=0;r<wv.r;r++){
      for(let c=0;c<wv.c;c++){
        this.time.delayedCall(r*210+c*70,()=>{
          if(!this.dead&&this.phase==='ENEMIES') this.spawnEnemy(sx*(c+1),-80-r*62,wv.t,spd);
        });
      }
    }
    this.waveECount=wv.r*wv.c;
  }

  spawnEnemy(x,y,type,spd){
    const e=this.enemies.create(x,y,type); e.setDepth(6);
    e.etype=type;
    const hpM={e1:1,e2:2,e3:1,e4:3}; const ptM={e1:100,e2:200,e3:150,e4:300};
    e.hp=(hpM[type]||1)+Math.floor(this.lvlIdx/4);
    e.maxHp=e.hp;
    e.pts=(ptM[type]||100)*(1+Math.floor(this.lvlIdx/3))*(this.combo||1);
    e.setVelocityY(spd);
    if(type==='e2'){e.zdir=Math.random()>.5?1:-1;e.zt=0;e.setVelocityX(0);}
    if(type==='e3'){e.setVelocityY(spd*1.55);e.setVelocityX(Phaser.Math.Between(-55,55));}
    if(type==='e4'){e.setVelocityY(spd*.65);e.bombTimer=Phaser.Math.Between(1500,3000);}
  }

  checkWaveClear(){
    if(this.enemies.countActive()===0&&this.phase==='ENEMIES'){
      this.waveIdx++;
      const lvl=LEVELS[this.lvlIdx];
      if(this.waveIdx<lvl.waves.length){
        this.time.delayedCall(800,()=>this.spawnWave());
      } else {
        this.time.delayedCall(600,()=>this.bossComing());
      }
    }
  }

  bossComing(){
    this.phase='BOSS_INCOMING';
    this.eBullets.clear(true,true);
    this.pBullets.clear(true,true);
    const lvl=LEVELS[this.lvlIdx];
    this.announce(`⚠ BOSS : ${lvl.boss.n} ⚠`,'#ff3300',1000);
    this.cameras.main.shake(400,.01);
    this.time.delayedCall(1400,()=>this.spawnBoss());
  }

  spawnBoss(){
    if(this.dead) return;
    const lvl=LEVELS[this.lvlIdx]; const bc=lvl.boss;
    const {W}=this; const texKey='b_'+bc.t;
    this.boss=this.bossGrp.create(W/2,-80,texKey);
    this.boss.setDepth(7);
    this.boss.hp=bc.hp; this.boss.maxHp=bc.hp;
    this.boss.btype=bc.t; this.boss.bname=bc.n;
    this.boss.bspd=bc.spd; this.boss.bfr=bc.fr;
    this.boss.mdir=1; this.boss.mvT=0; this.boss.t=0;
    this.boss.phase=1; this.boss.vx=0; this.boss.vy=0;
    this.boss.entering=true; this.boss.targetY=90+Math.floor(this.lvlIdx/5)*10;
    this.boss.setVelocityY(60);
    this.bossPhase=1;
    // Show boss bar
    const bw=this.W*.72;
    this.bBarBg.setVisible(true); this.bBar.setVisible(true);
    this.bBarLbl.setVisible(true); this.bBarPct.setVisible(true);
    this.bBarLbl.setText(`⚠ ${bc.n} ⚠`);
    this.bBar.width=bw;
    this.phase='BOSS';
    // Setup fire events
    this.setupBossFire();
  }

  setupBossFire(){
    this.clearBossFireEvts();
    if(!this.boss||!this.boss.active) return;
    const b=this.boss; const {btype,bfr,bspd,phase}=b;
    const spd=bspd||1;
    // Primary fire
    const e1=this.time.addEvent({delay:bfr,callback:()=>this.bossFire(b),loop:true});
    this.bossFireEvts.push(e1);
    // Secondary/extra patterns
    if(btype==='dreadnought'){
      const e2=this.time.addEvent({delay:bfr*1.7,callback:()=>this.bossSpread(b,4,40),loop:true});
      this.bossFireEvts.push(e2);
    }
    if(btype==='sentinel'){
      const e2=this.time.addEvent({delay:bfr*.8,callback:()=>this.sentinelRotFire(b),loop:true});
      this.bossFireEvts.push(e2);
    }
    if(btype==='titan'&&phase>=2){
      const e2=this.time.addEvent({delay:bfr*.9,callback:()=>this.bossSpread(b,5,30),loop:true});
      this.bossFireEvts.push(e2);
    }
    if(btype==='ultima'){
      const e2=this.time.addEvent({delay:bfr*.7,callback:()=>this.bossSpread(b,5,35),loop:true});
      const e3=this.time.addEvent({delay:bfr*3.2,callback:()=>this.bossMissileFire(b),loop:true});
      const e4=this.time.addEvent({delay:bfr*5.5,callback:()=>this.bossCircleFire(b),loop:true});
      this.bossFireEvts.push(e2,e3,e4);
      if(phase>=3){
        const e5=this.time.addEvent({delay:bfr*.45,callback:()=>this.bossAimed(b),loop:true});
        this.bossFireEvts.push(e5);
      }
    }
  }

  clearBossFireEvts(){
    this.bossFireEvts.forEach(e=>e&&e.remove(false));
    this.bossFireEvts=[];
  }

  // Boss fire patterns
  bossFire(boss){
    if(!boss?.active||this.dead||this.phase!=='BOSS') return;
    switch(boss.btype){
      case 'corsair':   this.bossSpread(boss,3,40); break;
      case 'dreadnought': this.bossMissileFire(boss); break;
      case 'phantom':   this.bossAimed(boss); break;
      case 'sentinel':  this.bossAimed(boss); break;
      case 'titan':     boss.phase===1?this.bossSpread(boss,3,35):boss.phase===2?this.bossSpread(boss,5,28):this.bossCircleFire(boss); break;
      case 'ultima':    this.bossAimed(boss); break;
    }
  }

  bossSpread(boss,count=3,angle=40){
    if(!boss?.active) return;
    const step=count>1?angle*2/(count-1):0;
    for(let i=0;i<count;i++){
      const deg=-angle+i*step;
      const rad=Phaser.Math.DegToRad(90+deg);
      const b=this.eBullets.create(boss.x,boss.y+30,'bb').setDepth(8).setScale(1.1);
      b.setVelocity(Math.cos(rad-Math.PI/2)*250, Math.sin(rad-Math.PI/2)*250+90);
    }
  }

  bossAimed(boss){
    if(!boss?.active||!this.player?.active) return;
    const ang=Phaser.Math.Angle.Between(boss.x,boss.y,this.player.x,this.player.y);
    const spd=240+(this.lvlIdx*8);
    const b=this.eBullets.create(boss.x,boss.y+30,'bb').setDepth(8);
    b.setVelocity(Math.cos(ang)*spd, Math.sin(ang)*spd);
  }

  bossMissileFire(boss){
    if(!boss?.active) return;
    [-20,20].forEach(ox=>{
      const b=this.eBullets.create(boss.x+ox,boss.y+35,'bm').setDepth(8);
      if(this.player?.active){
        const ang=Phaser.Math.Angle.Between(boss.x+ox,boss.y+35,this.player.x,this.player.y);
        b.setVelocity(Math.cos(ang)*200, Math.sin(ang)*200);
      } else { b.setVelocityY(200); }
    });
  }

  bossCircleFire(boss){
    if(!boss?.active) return;
    const n=boss.btype==='ultima'?16:10;
    for(let i=0;i<n;i++){
      const ang=(Math.PI*2/n)*i;
      const b=this.eBullets.create(boss.x,boss.y+20,'bb').setDepth(8);
      b.setVelocity(Math.cos(ang)*195, Math.sin(ang)*195);
    }
  }

  sentinelRotFire(boss){
    if(!boss?.active) return;
    const ba=Phaser.Math.DegToRad(boss.angle||0);
    [0,90,180,270].forEach(d=>{
      const ang=ba+Phaser.Math.DegToRad(d);
      const b=this.eBullets.create(boss.x,boss.y,'bb').setDepth(8);
      b.setVelocity(Math.cos(ang)*220, Math.sin(ang)*220);
    });
  }

  enemyShoot(){
    if(this.dead||this.paused||this.phase==='BOSS_INCOMING') return;
    const alive=this.enemies.getChildren().filter(e=>e.active);
    if(!alive.length) return;
    const sh=Phaser.Utils.Array.GetRandom(alive);
    if(!sh?.active) return;
    const b=this.eBullets.create(sh.x,sh.y+18,'be').setDepth(7);
    if(this.lvlIdx>=4&&this.player?.active){
      const ang=Phaser.Math.Angle.Between(sh.x,sh.y,this.player.x,this.player.y);
      const sp=185+(this.lvlIdx*14);
      b.setVelocity(Math.cos(ang)*sp, Math.sin(ang)*sp);
    } else { b.setVelocityY(190+(this.lvlIdx*12)); }
  }

  // ── PLAYER SHOOT ──
  fire(){
    if(this.dead||this.paused) return;
    const now=this.time.now;
    const rate=this.rapidFire?this.fireRate*.35:this.fireRate;
    if(now-this.lastShot<rate) return;
    this.lastShot=now;
    const {x,y}=this.player;
    if(this.triShot){
      [[-14,x-14],[0,x],[14,x+14]].forEach(([ox,bx])=>{
        const b=this.pBullets.create(bx,y-22,'bp').setDepth(9);
        b.setVelocityY(-640); b.setVelocityX(ox*5);
      });
    } else {
      this.pBullets.create(x,y-22,'bp').setDepth(9).setVelocityY(-640);
    }
  }

  // ── COLLISION HANDLERS ──
  onBltEnemy(blt,enemy){
    if(!blt.active||!enemy.active) return;
    blt.destroy();
    this.tweens.add({targets:enemy,alpha:.25,duration:50,yoyo:true});
    enemy.hp--;
    if(enemy.hp<=0){
      this.addScore(enemy.pts);
      this.explode(enemy.x,enemy.y,'small');
      this.float(enemy.x,enemy.y,`+${enemy.pts}`,{e1:'#ff8800',e2:'#ff00cc',e3:'#ffee00',e4:'#55ff00'}[enemy.etype]||'#ffffff');
      if(Math.random()<.16) this.spawnPup(enemy.x,enemy.y);
      enemy.destroy();
      this.time.delayedCall(60,()=>this.checkWaveClear());
    }
  }

  onBltBoss(blt,boss){
    if(!blt.active||!boss.active||boss.entering) return;
    blt.destroy();
    boss.hp--;
    // Flash
    this.tweens.add({targets:boss,alpha:.3,duration:50,yoyo:true});
    // Update bar
    const pct=boss.hp/boss.maxHp;
    this.bBar.width=this.W*.72*pct;
    this.bBarPct.setText(`${Math.ceil(pct*100)}%`);
    // Check phase change (titan & ultima)
    this.checkBossPhase(boss);
    if(boss.hp<=0){
      const pts=5000*(this.lvlIdx+1);
      this.addScore(pts);
      this.explode(boss.x,boss.y,'big');
      this.float(boss.x,boss.y,`BOSS DÉTRUIT! +${pts}`,'#ff6600',34);
      boss.destroy(); this.boss=null;
      this.clearBossFireEvts();
      this.bBarBg.setVisible(false); this.bBar.setVisible(false);
      this.bBarLbl.setVisible(false); this.bBarPct.setVisible(false);
      this.time.delayedCall(600,()=>this.levelComplete());
    }
  }

  checkBossPhase(boss){
    if(!boss?.active) return;
    const pct=boss.hp/boss.maxHp;
    const newPhase=pct>.66?1:pct>.33?2:3;
    if(newPhase!==this.bossPhase){
      this.bossPhase=newPhase;
      boss.phase=newPhase;
      this.cameras.main.shake(350,.018);
      this.cameras.main.flash(200,255,100,0,false);
      if(boss.btype==='titan'||boss.btype==='ultima'){
        this.announce(`⚡ PHASE ${newPhase} ⚡`,boss.btype==='ultima'?'#ff00cc':'#ff8800',700);
        this.setupBossFire();
      }
    }
  }

  onEBltPlayer(blt,_player){
    if(!blt.active) return; blt.destroy();
    if(this.invincible) return;
    if(this.shielded){this.breakShield();return;}
    this.hitPlayer();
  }

  onEnemyPlayer(enemy,_player){
    if(!enemy.active||this.invincible) return;
    this.explode(enemy.x,enemy.y,'small'); enemy.destroy();
    if(this.shielded){this.breakShield();return;}
    this.hitPlayer();
  }

  onBossPlayer(boss,_player){
    if(!boss.active||this.invincible||boss.entering) return;
    if(this.shielded){this.breakShield();return;}
    this.hitPlayer();
  }

  onPickup(pu,_player){
    const t=pu.ptype; pu.destroy();
    this.cameras.main.flash(120,80,200,255,false);
    const msgs={triple:'TIR TRIPLE!',shield:'BOUCLIER!',speed:'VITESSE!',rapid:'TIR RAPIDE!',bomb:'BOMBE +1!'};
    const cols={triple:'#00ffcc',shield:'#4488ff',speed:'#ffee00',rapid:'#ff8800',bomb:'#ff4466'};
    this.float(this.player.x,this.player.y-20,msgs[t]||t,cols[t]||'#fff');
    const dur=7500;
    if(t==='triple'){this.triShot=true;this.setPT('tri',dur,()=>this.triShot=false);}
    if(t==='rapid'){this.rapidFire=true;this.setPT('rap',dur,()=>this.rapidFire=false);}
    if(t==='speed'){this.pSpeed=510;this.setPT('spd',dur,()=>this.pSpeed=310);}
    if(t==='shield'){this.shielded=true;}
    if(t==='bomb'){this.bombCnt=Math.min(this.bombCnt+1,3);}
    this.refreshPupUI();
  }

  setPT(id,ms,cb){
    // Nettoyer le timer précédent
    if(this['pt_'+id]){
      this['pt_'+id].remove(false);
    }
    // Créer un nouveau timer avec vérification de validité de la scène
    const timer = this.time.delayedCall(ms, () => {
      if (this && !this.dead && this.scene.isActive()) {
        cb();
        this.refreshPupUI();
      }
    });
    this['pt_'+id] = timer;
    this._powerupTimers.push(timer);
  }

  breakShield(){
    this.shielded=false; this.shieldImg.setAlpha(0);
    this.float(this.player.x,this.player.y,'BOUCLIER BRISÉ','#4488ff');
    this.refreshPupUI();
  }

  hitPlayer(){
    if(this.invincible) return; // Sécurité supplémentaire
    this.lives--; this.refreshLivesUI();
    this.cameras.main.shake(180,.016);
    this.cameras.main.flash(220,255,30,30,false);
    this.combo=1; this.txtCombo.setText('');
    this.invincible=true;
    this.tweens.add({targets:this.player,alpha:.15,duration:90,yoyo:true,repeat:9,onComplete:()=>{
      if(this.player) this.player.setAlpha(1);
      this.invincible=false;
    }});
    if(this.lives<=0) this.doGameOver();
  }

  addScore(pts){
    this.score+=pts*this.combo;
    this.txtScore.setText(`SCORE : ${this.score}`);
    this.combo=Math.min(this.combo+1,8);
    if(this.comboT) this.comboT.reset({delay:2500,callback:()=>{this.combo=1;this.txtCombo.setText('');},callbackScope:this,repeat:0});
    else this.comboT=this.time.delayedCall(2500,()=>{this.combo=1;this.txtCombo.setText('');});
    if(this.combo>1) this.txtCombo.setText(`×${this.combo} COMBO!`);
  }

  refreshLivesUI(){
    let h=''; for(let i=0;i<this.lives;i++)h+='❤️'; for(let i=this.lives;i<3;i++)h+='🖤';
    this.txtLives.setText(h);
  }

  refreshPupUI(){
    const p=[];
    if(this.triShot)  p.push('3x');
    if(this.shielded) p.push('🛡');
    if(this.pSpeed>310)p.push('⚡');
    if(this.rapidFire)p.push('🔥');
    this.txtPups.setText(p.join('  '));
    this.txtBomb.setText(`💣×${this.bombCnt}`);
  }

  useBomb(){
    if(this.bombCnt<=0||this.dead) return;
    this.bombCnt--;
    this.cameras.main.shake(500,.03);
    this.cameras.main.flash(300,255,150,0,false);
    this.enemies.getChildren().forEach(e=>{
      if(!e.active) return;
      this.addScore(e.pts); this.explode(e.x,e.y,'small'); e.destroy();
    });
    if(this.boss?.active){
      const dmg=Math.floor(this.boss.maxHp*.12);
      this.boss.hp=Math.max(1,this.boss.hp-dmg);
      const pct=this.boss.hp/this.boss.maxHp;
      this.bBar.width=this.W*.72*pct;
      this.bBarPct.setText(`${Math.ceil(pct*100)}%`);
      this.checkBossPhase(this.boss);
    }
    this.eBullets.clear(true,true);
    this.float(this.W/2,this.H/2,'💣 BOMBE!','#ff8800',38);
    this.refreshPupUI();
    this.time.delayedCall(60,()=>this.checkWaveClear());
  }

  spawnPup(x,y){
    const types=['triple','shield','speed','rapid','bomb'];
    const t=Phaser.Utils.Array.GetRandom(types);
    const pu=this.pups.create(x,y,'pu_'+t).setDepth(8);
    pu.ptype=t; pu.setVelocityY(70);
    this.tweens.add({targets:pu,scaleX:1.25,scaleY:1.25,duration:450,yoyo:true,repeat:-1});
  }

  // ── LEVEL COMPLETE ──
  levelComplete(){
    if(this.dead) return;
    this.phase='LEVEL_COMPLETE';
    this.eBullets.clear(true,true);
    const bonus=(this.lvlIdx+1)*600;
    this.addScore(bonus);
    this.float(this.W/2,this.H*.4,`BONUS NIVEAU : +${bonus}`,'#ffaa00',32);
    this.announce(this.lvlIdx>=19?'🏆 VICTOIRE! 🏆':`NIVEAU ${this.lvlIdx+1} COMPLÉTÉ!`,'#ffff00',1100);
    const nextLvl=this.lvlIdx+2;
    const maxLvl=parseInt(localStorage.getItem('sa_ml')||1);
    if(nextLvl>maxLvl) localStorage.setItem('sa_ml',Math.min(nextLvl,20));
    this.time.delayedCall(2600,()=>{
      if(this.lvlIdx>=19){
        this.scene.start('Victory',{score:this.score});
      } else {
        this.lvlIdx++;
        this.startLevel();
      }
    });
  }

  doGameOver(){
    this.dead=true;
    this.clearBossFireEvts();
    const hs=parseInt(localStorage.getItem('sa_hs')||0);
    if(this.score>hs) localStorage.setItem('sa_hs',this.score);
    this.time.delayedCall(700,()=>this.scene.start('GameOver',{score:this.score,level:this.lvlIdx+1}));
  }

  togglePause(){
    this.paused=!this.paused;
    [this.pBg,this.pTx,this.pSub].forEach(o=>o.setVisible(this.paused));
    this.paused?this.physics.pause():this.physics.resume();
    this.eshootEvt.paused=this.paused;
    if(this.paused) this.bossFireEvts.forEach(e=>e.paused=true);
    else this.bossFireEvts.forEach(e=>e.paused=false);
  }

  // ── EFFECTS ──
  explode(x,y,size='normal'){
    const n=size==='big'?24:size==='small'?6:12;
    const cols=[0xff8800,0xff4400,0xffff00,0xff0000,0xffffff,0xff6600];
    for(let i=0;i<n;i++){
      const p=this.add.image(x,y,'pt').setDepth(13);
      const ang=Math.random()*Math.PI*2, sp=Phaser.Math.Between(50,size==='big'?290:170);
      p.setTint(Phaser.Utils.Array.GetRandom(cols));
      p.setScale(Phaser.Math.FloatBetween(.4,size==='big'?3:1.9));
      this.tweens.add({targets:p,x:x+Math.cos(ang)*sp*.55,y:y+Math.sin(ang)*sp*.55,alpha:0,scaleX:.05,scaleY:.05,duration:Phaser.Math.Between(280,680),ease:'Power2',onComplete:()=>p.destroy()});
    }
    if(size==='big') this.cameras.main.shake(400,.025);
  }

  float(x,y,txt,color='#fff',fs){
    const {W}=this;
    const t=this.add.text(x,y,txt,{fontFamily:'Orbitron',fontSize:(fs||Math.floor(W*.035))+'px',fill:color,stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(25);
    this.tweens.add({targets:t,y:y-70,alpha:0,duration:1300,ease:'Power2',onComplete:()=>t.destroy()});
  }

  announce(txt,color='#ffffff',hold=700){
    const {W,H}=this;
    const t=this.add.text(W/2,H/2,txt,{fontFamily:'Orbitron',fontSize:Math.floor(W*.068)+'px',fill:color,stroke:'#000',strokeThickness:4,align:'center'}).setOrigin(.5).setDepth(30).setAlpha(0);
    this.tweens.add({targets:t,alpha:{from:0,to:1},duration:320,yoyo:true,hold,onComplete:()=>t.destroy()});
  }

  // ── UPDATE ──
  update(time,delta){
    if(this.dead) return;
    if(Phaser.Input.Keyboard.JustDown(this.pKey)||Phaser.Input.Keyboard.JustDown(this.escKey)){this.togglePause();}
    if(this.paused) return;

    // Scroll stars
    this.starsGfx.clear();
    for(const s of this.stars){
      s.y+=s.s; if(s.y>this.H){s.y=0;s.x=Phaser.Math.Between(0,this.W);}
      this.starsGfx.fillStyle(s.c,s.a); this.starsGfx.fillRect(s.x,s.y,s.s*.6,s.s*2.5);
    }

    // Player movement
    const sp=this.pSpeed; let vx=0,vy=0;
    const L=this.cursors.left.isDown||this.wasd.A.isDown;
    const R=this.cursors.right.isDown||this.wasd.D.isDown;
    const U=this.cursors.up.isDown||this.wasd.W.isDown;
    const D=this.cursors.down.isDown||this.wasd.S.isDown;
    if(L)vx=-sp; else if(R)vx=sp;
    if(U)vy=-sp; else if(D)vy=sp;
    if(this.isTouching&&this.touchX!==null){
      const dx=this.touchX-this.player.x, dy=this.touchY-this.player.y;
      const dist=Math.hypot(dx,dy);
      if(dist>12){vx=(dx/dist)*Math.min(dist,1)*sp;vy=(dy/dist)*Math.min(dist,1)*sp;}
    }
    this.player.setVelocity(vx,vy);
    this.player.setAngle(Phaser.Math.Clamp(vx/sp*14,-14,14));

    // Shoot
    if(this.spaceKey.isDown||this.shootHeld) this.fire();
    if(Phaser.Input.Keyboard.JustDown(this.bKey)) this.useBomb();

    // Shield visual
    if(this.shielded){
      this.shieldImg.setPosition(this.player.x,this.player.y);
      this.shieldImg.setAlpha(.75+Math.sin(time*.006)*.2);
    } else this.shieldImg.setAlpha(0);

    // Enemy AI
    this.enemies.getChildren().forEach(e=>{
      if(!e.active) return;
      if(e.etype==='e2'){e.zt+=delta;if(e.zt>750){e.zt=0;e.zdir*=-1;}e.setVelocityX(e.zdir*135);}
      if(e.etype==='e4'&&this.phase==='ENEMIES'){
        e.bombTimer-=delta;
        if(e.bombTimer<=0){
          e.bombTimer=Phaser.Math.Between(1800,3500);
          const b=this.eBullets.create(e.x,e.y+22,'be').setDepth(7).setScale(1.3);
          b.setVelocityY(160);
        }
      }
      if(e.y>this.H+50){
        e.destroy();
        if(!this.invincible&&!this.dead) this.hitPlayer();
        this.time.delayedCall(60,()=>this.checkWaveClear());
      }
    });

    // Boss AI
    const boss=this.boss;
    if(boss?.active){
      if(boss.entering){
        if(boss.y>=boss.targetY){boss.setVelocityY(0);boss.entering=false;}
        return;
      }
      boss.mvT+=delta;
      switch(boss.btype){
        case 'corsair':
          boss.x+=boss.mdir*1.9*boss.bspd;
          if(boss.x>this.W-55||boss.x<55) boss.mdir*=-1;
          break;
        case 'dreadnought':
          if(boss.mvT>2200){boss.mvT=0;boss.mdir*=-1;}
          boss.x+=boss.mdir*.85*boss.bspd;
          break;
        case 'phantom':
          if(boss.mvT>1100){boss.mvT=0;boss.vx=Phaser.Math.Between(-180,180)*boss.bspd;boss.vy=Phaser.Math.Between(-55,55);}
          boss.x+=boss.vx*(delta/1000); boss.y+=boss.vy*(delta/1000);
          boss.x=Phaser.Math.Clamp(boss.x,50,this.W-50);
          boss.y=Phaser.Math.Clamp(boss.y,45,this.H*.42);
          // Phantom blink
          boss.setAlpha(.6+Math.sin(time*.008)*.4);
          break;
        case 'sentinel':
          boss.angle=(boss.angle||0)+0.9*(boss.bspd||1);
          boss.x+=boss.mdir*1.3*boss.bspd;
          if(boss.x>this.W-58||boss.x<58) boss.mdir*=-1;
          break;
        case 'titan':
          boss.t+=delta*.0008*boss.bspd;
          boss.x=this.W/2+Math.sin(boss.t)*(this.W*.38);
          boss.y=boss.targetY+Math.sin(boss.t*2)*28;
          // Titan changes color by phase
          boss.setTint(boss.phase===3?0xff4444:boss.phase===2?0xff8800:0xffffff);
          break;
        case 'ultima':
          boss.t+=delta*.001*boss.bspd;
          boss.x=this.W/2+Math.sin(boss.t)*(this.W*.4);
          boss.y=boss.targetY+Math.sin(boss.t*1.5)*38;
          // Ultima rainbow tint
          const hue=(time*.002)%1;
          boss.setTint(Phaser.Display.Color.HSVToRGB(hue,1,1).color);
          break;
      }
    }

    // Cleanup
    this.pBullets.getChildren().forEach(b=>{if(b.y<-20)b.destroy();});
    this.eBullets.getChildren().forEach(b=>{if(b.y>this.H+25||b.x<-25||b.x>this.W+25)b.destroy();});
    this.pups.getChildren().forEach(p=>{if(p.y>this.H+30)p.destroy();});
  }
}

// ═══════════════════════════════════════════════════
//  GAME OVER SCENE
// ═══════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene{
  constructor(){super('GameOver')}
  init(d){this.fs=d.score||0;this.fl=d.level||1;}
  create(){
    const {width:W,height:H}=this.scale, cx=W/2;
    const fs=Math.floor(W*.042), sm=Math.floor(W*.032);
    this.add.text(cx,H*.12,'GAME OVER',{fontFamily:'Orbitron',fontSize:Math.floor(W*.11)+'px',fill:'#ff2200',stroke:'#550000',strokeThickness:5}).setOrigin(.5);
    this.add.text(cx,H*.29,`SCORE FINAL : ${this.fs}`,{fontFamily:'Orbitron',fontSize:Math.floor(W*.068)+'px',fill:'#00ffcc'}).setOrigin(.5);
    this.add.text(cx,H*.39,`NIVEAU ATTEINT : ${this.fl}/20`,{fontFamily:'Orbitron',fontSize:fs+'px',fill:'#ffaa00'}).setOrigin(.5);
    const hs=parseInt(localStorage.getItem('sa_hs')||0);
    if(this.fs>=hs&&this.fs>0){
      const t=this.add.text(cx,H*.50,'🏆 NOUVEAU RECORD! 🏆',{fontFamily:'Orbitron',fontSize:fs+'px',fill:'#ffff00',stroke:'#665500',strokeThickness:2}).setOrigin(.5);
      this.tweens.add({targets:t,scaleX:1.1,scaleY:1.1,duration:500,yoyo:true,repeat:-1});
    } else {
      this.add.text(cx,H*.50,`RECORD : ${hs}`,{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#666688'}).setOrigin(.5);
    }
    const rBtn=this.add.text(cx,H*.68,'[ REJOUER ]',{fontFamily:'Orbitron',fontSize:Math.floor(W*.072)+'px',fill:'#00ff88',stroke:'#004422',strokeThickness:3}).setOrigin(.5).setInteractive({useHandCursor:true});
    rBtn.on('pointerdown',()=>this.scene.start('Game',{startLevel:1}));
    rBtn.on('pointerover',()=>rBtn.setFill('#aaffcc'));
    rBtn.on('pointerout',()=>rBtn.setFill('#00ff88'));
    this.tweens.add({targets:rBtn,scaleX:1.06,scaleY:1.06,duration:650,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    const cBtn=this.add.text(cx,H*.79,`[ CONTINUER NIVEAU ${this.fl} ]`,{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#aaaaff',stroke:'#222244',strokeThickness:2}).setOrigin(.5).setInteractive({useHandCursor:true});
    cBtn.on('pointerdown',()=>this.scene.start('Game',{startLevel:this.fl}));
    cBtn.on('pointerover',()=>cBtn.setFill('#ffffff'));
    cBtn.on('pointerout',()=>cBtn.setFill('#aaaaff'));
    const mBtn=this.add.text(cx,H*.88,'[ MENU ]',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#888899',stroke:'#222233',strokeThickness:2}).setOrigin(.5).setInteractive({useHandCursor:true});
    mBtn.on('pointerdown',()=>this.scene.start('Menu'));
    mBtn.on('pointerover',()=>mBtn.setFill('#ccccee'));
    mBtn.on('pointerout',()=>mBtn.setFill('#888899'));
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Game',{startLevel:1}));
    this.input.keyboard.once('keydown-R',()=>this.scene.start('Game',{startLevel:1}));
  }
}

// ═══════════════════════════════════════════════════
//  VICTORY SCENE
// ═══════════════════════════════════════════════════
class VictoryScene extends Phaser.Scene{
  constructor(){super('Victory')}
  init(d){this.fs=d.score||0;}
  create(){
    const {width:W,height:H}=this.scale, cx=W/2;
    const fs=Math.floor(W*.04), sm=Math.floor(W*.032);
    // Fireworks effect
    this.time.addEvent({delay:300,callback:()=>{
      const x=Phaser.Math.Between(W*.1,W*.9), y=Phaser.Math.Between(H*.1,H*.5);
      const cols=[0xff0000,0xffaa00,0x00ffcc,0xff00ff,0xffff00,0x00aaff];
      for(let i=0;i<18;i++){
        const p=this.add.image(x,y,'pt').setDepth(5);
        const ang=Math.random()*Math.PI*2, sp=Phaser.Math.Between(60,200);
        p.setTint(Phaser.Utils.Array.GetRandom(cols));p.setScale(Phaser.Math.FloatBetween(1,2.5));
        this.tweens.add({targets:p,x:x+Math.cos(ang)*sp,y:y+Math.sin(ang)*sp,alpha:0,duration:Phaser.Math.Between(500,1000),ease:'Power2',onComplete:()=>p.destroy()});
      }
    },repeat:30});
    this.add.text(cx,H*.10,'🏆 VICTOIRE 🏆',{fontFamily:'Orbitron',fontSize:Math.floor(W*.1)+'px',fill:'#ffff00',stroke:'#886600',strokeThickness:4}).setOrigin(.5);
    this.add.text(cx,H*.24,'20 NIVEAUX COMPLÉTÉS!',{fontFamily:'Orbitron',fontSize:Math.floor(W*.055)+'px',fill:'#00ffcc'}).setOrigin(.5);
    this.add.text(cx,H*.34,`SCORE FINAL : ${this.fs}`,{fontFamily:'Orbitron',fontSize:Math.floor(W*.065)+'px',fill:'#ff8800'}).setOrigin(.5);
    const hs=parseInt(localStorage.getItem('sa_hs')||0);
    this.add.text(cx,H*.44,`RECORD : ${Math.max(this.fs,hs)}`,{fontFamily:'Orbitron',fontSize:fs+'px',fill:'#ffcc44'}).setOrigin(.5);
    this.add.text(cx,H*.56,'Tu as sauvé la galaxie!',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#aaaacc'}).setOrigin(.5);
    this.add.text(cx,H*.63,'ULTIMA a été vaincu. La paix règne.',{fontFamily:'Orbitron',fontSize:Math.floor(W*.026)+'px',fill:'#666688'}).setOrigin(.5);
    const rBtn=this.add.text(cx,H*.76,'[ REJOUER DEPUIS LE DÉBUT ]',{fontFamily:'Orbitron',fontSize:Math.floor(W*.055)+'px',fill:'#00ff88',stroke:'#004422',strokeThickness:3}).setOrigin(.5).setInteractive({useHandCursor:true});
    rBtn.on('pointerdown',()=>this.scene.start('Game',{startLevel:1}));
    rBtn.on('pointerover',()=>rBtn.setFill('#aaffcc'));
    rBtn.on('pointerout',()=>rBtn.setFill('#00ff88'));
    this.tweens.add({targets:rBtn,scaleX:1.05,scaleY:1.05,duration:700,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    const mBtn=this.add.text(cx,H*.87,'[ MENU ]',{fontFamily:'Orbitron',fontSize:sm+'px',fill:'#888899',stroke:'#222233',strokeThickness:2}).setOrigin(.5).setInteractive({useHandCursor:true});
    mBtn.on('pointerdown',()=>this.scene.start('Menu'));
    mBtn.on('pointerover',()=>mBtn.setFill('#ccccee'));
    mBtn.on('pointerout',()=>mBtn.setFill('#888899'));
  }
}
